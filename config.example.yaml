app:
  name: jumpa

server:
  port: 8080

db:
  # sqlite | mysql | mariadb | postgres
  driver: sqlite
  dsn: "file:backend?mode=memory&cache=shared"
  node_id: 0

  # MySQL example:
  # driver: mysql
  # dsn: "user:password@tcp(127.0.0.1:3306)/arcgo?parseTime=true&loc=Local"

  # MariaDB example:
  # driver: mariadb
  # dsn: "user:password@tcp(127.0.0.1:3306)/jumpa?parseTime=true&loc=Local"

  # PostgreSQL example:
  # driver: postgres
  # dsn: "postgres://user:password@127.0.0.1:5432/arcgo?sslmode=disable"

scheduler:
  enabled: true
  heartbeat_sec: 60
  distributed:
    enabled: false
    key_prefix: "gocron:lock"
    ttl_sec: 30

valkey:
  enabled: false
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  use_tls: false

identity:
  provider: local
  os:
    # auto | pam | winlogon | opendirectory
    backend: auto
    pam_service: sshd
    directory_node: "/Search"
    create_home_policy: manual

bastion:
  enabled: true
  ssh:
    listen_addr: ":2222"
    host_key_path: "./secrets/ssh_host_ed25519_key"
    host_key_policy: "insecure"
    known_hosts_path: "./secrets/known_hosts"
    trusted_proxy_cidr: ""
  session:
    idle_timeout_min: 15
    max_duration_min: 480
    recording_directory: "./data/recordings"
  access:
    approval_ttl_min: 30

gateway:
  registry:
    node_name: ""
    node_key: ""
    advertise_addr: ""
    zone: "default"
    tags_csv: "ssh"
    heartbeat_sec: 15
    offline_after_sec: 60

audit:
  store_command_input: true
  store_replay_stream: true

cli:
  api_url: "http://127.0.0.1:8080"
  gateway_addr: ""
  email: ""
  password: ""
  principal: ""
  ssh_binary: "ssh"
  alt_screen: true
