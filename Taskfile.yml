# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  APP_IMAGE_SERVER: arcgo-rbac-server:latest
  APP_IMAGE_MIGRATE: arcgo-rbac-migrate:latest
  COMPOSE_PROD_FILE: docker-compose.prod.yml
  GOOS: '{{default OS .GOOS}}'
  GOARCH: '{{default ARCH .GOARCH}}'
  BIN_EXT: '{{if eq .GOOS "windows"}}.exe{{end}}'
  DIST_DIR: dist

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w .

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run Go tests
    cmds:
      - go test ./...

  check:
    desc: Run fmt check + lint + tests
    cmds:
      - gofmt -l .
      - golangci-lint run ./...
      - go test ./...

  build:bins:
    desc: Build server and migrate binaries into dist
    cmds:
      - mkdir -p {{.DIST_DIR}}
      - go build -trimpath -ldflags="-s -w" -o {{.DIST_DIR}}/server{{.BIN_EXT}} ./cmd/server
      - go build -trimpath -ldflags="-s -w" -o {{.DIST_DIR}}/migrate{{.BIN_EXT}} ./cmd/migrate
    env:
      CGO_ENABLED: "0"
      GOOS: "{{.GOOS}}"
      GOARCH: "{{.GOARCH}}"

  build:bins:upx:
    desc: Build binaries and compress with UPX
    deps:
      - build:bins
    cmds:
      - upx --best --lzma {{.DIST_DIR}}/server{{.BIN_EXT}} {{.DIST_DIR}}/migrate{{.BIN_EXT}}

  docker:build:server:
    desc: Build server image (multi-stage target=server)
    cmds:
      - docker build --target server -t {{.APP_IMAGE_SERVER}} .

  docker:build:migrate:
    desc: Build migrate image (multi-stage target=migrate)
    cmds:
      - docker build --target migrate -t {{.APP_IMAGE_MIGRATE}} .

  docker:build:all:
    desc: Build both server and migrate images
    deps:
      - docker:build:server
      - docker:build:migrate

  compose:prod:up:
    desc: Start production-like stack with one-shot migrate
    deps:
      - docker:build:all
    cmds:
      - docker compose -f {{.COMPOSE_PROD_FILE}} up -d

  compose:prod:up:buildless:
    desc: Start production-like stack without rebuilding images
    cmds:
      - docker compose -f {{.COMPOSE_PROD_FILE}} up -d

  compose:prod:down:
    desc: Stop production-like stack
    cmds:
      - docker compose -f {{.COMPOSE_PROD_FILE}} down

  compose:prod:logs:
    desc: Tail logs of production-like stack
    cmds:
      - docker compose -f {{.COMPOSE_PROD_FILE}} logs -f --tail=200
