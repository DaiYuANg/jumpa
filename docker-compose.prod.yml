services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: rbac
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rbac"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:latest
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - valkey_data:/data

  migrate:
    build:
      context: .
      target: migrate
    environment:
      APP_DB_DRIVER: postgres
      APP_DB_DSN: postgres://postgres:postgres@postgres:5432/rbac?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: .
      target: server
    environment:
      APP_SERVER_PORT: 8080
      APP_DB_DRIVER: postgres
      APP_DB_DSN: postgres://postgres:postgres@postgres:5432/rbac?sslmode=disable
      APP_VALKEY_ENABLED: "true"
      APP_VALKEY_ADDR: valkey:6379
      APP_SCHEDULER_ENABLED: "true"
      APP_SCHEDULER_DISTRIBUTED_ENABLED: "true"
      APP_SCHEDULER_DISTRIBUTED_KEY_PREFIX: gocron:lock
      APP_SCHEDULER_DISTRIBUTED_TTL_SEC: 30
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
